name: Add Paper to README

on:
  issues:
    types: [opened, edited]

jobs:
  add-paper:
    if: contains(github.event.issue.labels.*.name, 'add-paper')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue and update README
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            const get = (label) => {
              const regex = new RegExp(`### ${label}\\s*\\n+([^\\n#]+)`);
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            };

            const title      = get('논문 제목');
            const conference = get('학회');
            const year       = get('연도');
            const section    = get('섹션');
            const reviewPath = get('Review 파일 경로');
            const paperUrl   = get('논문 링크 URL');

            if (!title || !conference || !year || !reviewPath || !paperUrl) {
              console.log('필수 항목 누락, 스킵');
              return;
            }

            // review 링크용 URL 인코딩
            const encodedPath = reviewPath
              .split('/')
              .map(seg => encodeURIComponent(seg).replace(/%2F/g, '/'))
              .join('/');

            const newRow = `| ${title} | ${conference} | ${year} | [review](./${encodedPath}) | [📎](${paperUrl}) |`;

            // 섹션 → 하위 폴더 매핑
            const sectionFolderMap = {
              'Fairness, Safety, Deepfake': 'deepfake-safety-fairness',
              'Diffusion Models': 'diffusion-models',
              'Object Detection': 'object-detection',
            };

            const folder = sectionFolderMap[section];
            if (!folder) {
              console.log(`섹션 "${section}" 에 해당하는 폴더를 찾을 수 없습니다.`);
              return;
            }

            // 하위 폴더 README 수정
            const fs = require('fs');
            const readmePath = `${folder}/README.md`;
            let readme = fs.readFileSync(readmePath, 'utf8');

            const lines = readme.split('\n');
            let lastTableLine = -1;
            for (let i = lines.length - 1; i >= 0; i--) {
              if (lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|')) {
                lastTableLine = i;
                break;
              }
            }
            if (lastTableLine === -1) {
              console.log('테이블을 찾을 수 없습니다.');
              return;
            }
            lines.splice(lastTableLine + 1, 0, newRow);
            readme = lines.join('\n');
            fs.writeFileSync(readmePath, readme);
            console.log(`${readmePath} 업데이트 완료`);

            // 루트 README 재생성
            const folders = [
              { dir: 'deepfake-safety-fairness', prefix: './deepfake-safety-fairness/' },
              { dir: 'diffusion-models',         prefix: './diffusion-models/' },
              { dir: 'object-detection',         prefix: './object-detection/' },
            ];

            let root = '# paper-reviews\n';
            for (let i = 0; i < folders.length; i++) {
              const { dir, prefix } = folders[i];
              const content = fs.readFileSync(`${dir}/README.md`, 'utf8');
              const replaced = content.replace(/\.\//g, prefix);
              root += '\n' + replaced;
              if (i < folders.length - 1) root += '\n---\n';
            }
            fs.writeFileSync('README.md', root);
            console.log('루트 README.md 업데이트 완료');

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deepfake-safety-fairness/README.md diffusion-models/README.md object-detection/README.md README.md
          git diff --cached --quiet || git commit -m "docs: add paper from issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'README.md에 논문이 추가되었습니다'
            });
